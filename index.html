<!DOCTYPE html>
<html lang="ko">
<head>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌠%3C/text%3E%3C/svg%3E">
<meta charset="UTF-8" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Do+Hyeon&display=swap" rel="stylesheet">
<style>

  /* ------------------------------- */
  /* ✨ 폰트 적용 (전체 바디 수정)      */
  /* ------------------------------- */
  body {
    font-family: "Do Hyeon", sans-serif; /* 폰트 변경됨 */
    background: linear-gradient(135deg, #ffffff, #f6f9ff, #eef3ff);
    background-size: 200% 200%;
    animation: bgMove 12s ease-in-out infinite;

    margin: 0;
    padding: 0;
    color: #333;

    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  /* ------------------------------- */
  /* ✨ 부드러운 움직이는 배경 Gradient */
  /* ------------------------------- */
  @keyframes bgMove {
    0%   { background-position: 0% 0%; }
    50%  { background-position: 100% 100%; }
    100% { background-position: 0% 0%; }
  }

  /* ⭐ 메뉴 Fade-in + Slide Down 등장 애니메이션 */
  @keyframes menuFadeIn {
    0%   { opacity: 0; transform: translateY(-18px); }
    60%  { opacity: 0.75; transform: translateY(6px); }
    100% { opacity: 1; transform: translateY(0px); }
  }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 28px;
    justify-items: center;

    animation: menuFadeIn 1.1s ease forwards;
  }

  /* Floating Animation */
  @keyframes floatUpDown {
    0%   { transform: translateY(0px); }
    50%  { transform: translateY(-6px); }
    100% { transform: translateY(0px); }
  }

  .menu-btn {
    width: 150px;
    height: 150px;
    border-radius: 20px;
    position: relative;
    overflow: hidden;

    text-decoration: none;
    cursor: pointer;

    border: 1px solid rgba(255, 255, 255, 0.45);
    color: #1e3a5f;
    
    /* 폰트 명시적용 (안전장치) 및 두께 조정 */
    font-family: "Do Hyeon", sans-serif;
    font-size: 22px; /* 가독성을 위해 약간 키움 */

    background: rgba(255,255,255,0.35);
    backdrop-filter: blur(10px);

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    gap: 10px;

    box-shadow:
      0 8px 18px rgba(0, 0, 0, 0.08),
      0 3px 6px rgba(0, 0, 0, 0.05);

    transition: all 0.28s ease;

    /* ✨ Floating */
    animation: floatUpDown 3.5s ease-in-out infinite;
  }

  .menu-btn:hover { animation-play-state: paused; }

  .menu-btn span.emoji {
    font-size: 42px;
    transition: transform 0.3s ease;
  }

  .menu-btn:hover {
    transform: translateY(-7px);
    background: linear-gradient(135deg, #FF0066cc, #0046FFcc);
    color: #ffffff;

    box-shadow:
      0 18px 40px rgba(0, 0, 0, 0.25),
      0 0 25px rgba(255, 0, 102, 0.4),
      0 0 28px rgba(0, 70, 255, 0.35),
      0 0 35px rgba(255, 255, 255, 0.45);
  }
  
  /* ------------------------------- */
  /* ✨ 버튼 클릭 시 Spring 효과 */
  /* ------------------------------- */
  @keyframes springClick {
    0%   { transform: scale(1); }
    30%  { transform: scale(0.90); }
    60%  { transform: scale(1.08); }
    100% { transform: scale(1); }
  }

  .menu-btn:active {
    animation: springClick 0.25s ease;
  }

  .menu-btn:hover span.emoji {
    transform: scale(1.75);
  }

  /* ------------------------------- */
  /* ✨ Hover 시 Shimmer(빛 흔들림 효과) */
  /* ------------------------------- */
  @keyframes shimmer {
    0%   { transform: translateX(-180%); }
    100% { transform: translateX(180%); }
  }

  .menu-btn .shimmer {
    content: "";
    position: absolute;
    top: 0;
    left: -150%;
    width: 200%;
    height: 100%;
    background: linear-gradient(
      115deg,
      transparent,
      rgba(255,255,255,0.28),
      transparent
    );
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .menu-btn:hover .shimmer {
    opacity: 1;
    animation: shimmer 1.4s linear infinite;
  }

  /* Light reflection */
  .menu-btn::before {
    content: "";
    position: absolute;
    top: -130%;
    left: -50%;
    width: 250%;
    height: 200%;
    background: linear-gradient(
      120deg,
      transparent 0%,
      rgba(255,255,255,0.45) 50%,
      transparent 100%
    );
    transform: rotate(25deg);
    transition: 0.6s;
    opacity: 0;
  }
  .menu-btn:hover::before {
    top: -20%;
    left: -20%;
    opacity: 1;
  }

  /* Neon border */
  .menu-btn::after {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: 20px;
    padding: 2px;

    background: linear-gradient(135deg, #FF0066, #0046FF);
    -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);
    mask-composite: exclude;

    opacity: 0;
    transition: 0.3s ease;
  }
  .menu-btn:hover::after {
    opacity: 1;
    box-shadow: 0 0 14px rgba(255, 0, 102, 0.6);
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    transform: scale(0);
    background: rgba(255,255,255,0.6);
    animation: ripple-effect 0.6s linear;
    pointer-events: none;
  }

  @keyframes ripple-effect {
    to {
      transform: scale(4);
      opacity: 0;
    }
  }

</style>
</head>

<body>

<div class="menu-grid">

  <a href="./broadcom" class="menu-btn"><span class="emoji"><img src="https://support.broadcom.com/o/ecx-standard-theme/images/favicon.ico"
                 style="width:35px;height:35px;margin-right:2px;margin-bottom:3px;vertical-align:middle;"></span>브로드컴 링크<div class="shimmer"></div></a>
  <a href="./case" class="menu-btn"><span class="emoji">⚠️</span>TAC Cases<div class="shimmer"></div></a>
  <a href="./sysinfo" class="menu-btn"><span class="emoji">🧩</span>Sysinfo 분석<div class="shimmer"></div></a>
  
  <a href="./archive" class="menu-btn"><span class="emoji">✂️</span>Archive 편집<div class="shimmer"></div></a>
  <a href="./xml" class="menu-btn"><span class="emoji">🗂️</span>XML 편집<div class="shimmer"></div></a>
  <a href="./isg" class="menu-btn"><span class="emoji">🔎</span>ISG 분석<div class="shimmer"></div></a>
  <a href="./trace" class="menu-btn"><span class="emoji">📄</span>Trace 분석<div class="shimmer"></div></a>
  
  <a href="./sizing-sg" class="menu-btn"><span class="emoji">📊</span>Sizing-SG<div class="shimmer"></div></a>
  <a href="./elk" class="menu-btn"><span class="emoji">🧬</span>ELK 로그 설정<div class="shimmer"></div></a>
  <a href="./pac" class="menu-btn"><span class="emoji">🚦</span>PAC<div class="shimmer"></div></a>

  <div></div><div></div>
</div>

<script>
  // Ripple 효과
  document.querySelectorAll(".menu-btn").forEach(btn => {
    btn.addEventListener("click", function(e) {
      const circle = document.createElement("span");
      const diameter = Math.max(btn.clientWidth, btn.clientHeight);
      const radius = diameter / 2;

      circle.style.width = circle.style.height = diameter + "px";
      circle.style.left = e.clientX - btn.offsetLeft - radius + "px";
      circle.style.top = e.clientY - btn.offsetTop - radius + "px";
      circle.classList.add("ripple");

      const ripple = btn.getElementsByClassName("ripple")[0];
      if (ripple) ripple.remove();

      btn.appendChild(circle);
    });
  });
</script>

</body>
</html>
