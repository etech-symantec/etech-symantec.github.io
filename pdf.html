<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF → 텍스트 표 변환기</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0d0d0f;
    --surface: #17181c;
    --border: #2a2b32;
    --accent: #00e5a0;
    --accent-dim: rgba(0, 229, 160, 0.12);
    --accent-glow: rgba(0, 229, 160, 0.35);
    --text: #e8e9f0;
    --text-dim: #7a7b88;
    --danger: #ff5e5e;
    --warning: #ffc15e;
    --table-head: #1e1f26;
    --table-row: #17181c;
    --table-alt: #1a1b22;
    --table-border: #25262e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── Header ── */
  header {
    padding: 28px 40px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 16px;
    position: relative;
  }
  header::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 40px;
    width: 120px; height: 2px;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent-glow);
  }
  .logo-mark {
    width: 38px; height: 38px;
    background: var(--accent-dim);
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    display: grid; place-items: center;
    font-size: 18px;
    box-shadow: 0 0 16px var(--accent-glow);
  }
  .logo-text { display: flex; flex-direction: column; gap: 1px; }
  .logo-title { font-size: 15px; font-weight: 700; letter-spacing: 0.04em; color: var(--text); }
  .logo-sub   { font-size: 11px; color: var(--text-dim); font-family: 'DM Mono', monospace; letter-spacing: 0.06em; }

  .header-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 10px;
  }
  .api-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 4px 10px;
    background: var(--accent-dim);
    border: 1px solid rgba(0,229,160,0.25);
    border-radius: 4px;
    color: var(--accent);
  }

  /* ── Main layout ── */
  main {
    flex: 1;
    padding: 48px 40px;
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
  }

  /* ── API Key input ── */
  .api-section {
    margin-bottom: 32px;
  }
  .section-label {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 4px; height: 4px;
    background: var(--accent);
    border-radius: 50%;
  }
  .api-key-row {
    display: flex; gap: 10px; align-items: center;
  }
  .api-key-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .api-key-input::placeholder { color: var(--text-dim); }
  .api-key-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  .btn {
    padding: 11px 20px;
    border-radius: 8px;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .btn-primary {
    background: var(--accent);
    color: #0d0d0f;
  }
  .btn-primary:hover {
    background: #1affc0;
    box-shadow: 0 0 20px var(--accent-glow);
  }
  .btn-primary:disabled {
    opacity: 0.4; cursor: not-allowed;
  }
  .btn-ghost {
    background: transparent;
    color: var(--text-dim);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Drop Zone ── */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 16px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
    background: var(--surface);
    margin-bottom: 32px;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--accent);
    background: var(--accent-dim);
    box-shadow: 0 0 30px var(--accent-glow) inset, 0 0 40px rgba(0,229,160,0.05);
  }
  .drop-icon {
    font-size: 42px;
    margin-bottom: 16px;
    opacity: 0.7;
  }
  .drop-title {
    font-size: 18px; font-weight: 600;
    margin-bottom: 8px;
  }
  .drop-sub {
    font-size: 13px;
    color: var(--text-dim);
    margin-bottom: 20px;
  }
  #file-input { display: none; }

  /* ── Progress ── */
  .progress-wrap {
    display: none;
    margin-bottom: 32px;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 10px;
  }
  .progress-label { font-size: 13px; font-weight: 500; }
  .progress-pct { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); }
  .progress-bar-bg {
    height: 6px;
    background: var(--border);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), #00b8ff);
    border-radius: 999px;
    transition: width 0.3s ease;
    box-shadow: 0 0 8px var(--accent-glow);
  }
  .progress-log {
    margin-top: 10px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    height: 18px;
  }

  /* ── Result Table Section ── */
  .result-section { display: none; }
  .result-header {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 20px;
  }
  .result-title { font-size: 18px; font-weight: 600; }
  .result-meta {
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--text-dim);
  }
  .result-actions { display: flex; gap: 8px; }

  /* ── Table ── */
  .table-wrap {
    overflow-x: auto;
    border-radius: 12px;
    border: 1px solid var(--table-border);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13.5px;
  }
  thead tr {
    background: var(--table-head);
    position: sticky; top: 0; z-index: 1;
  }
  thead th {
    padding: 12px 16px;
    text-align: left;
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid var(--table-border);
    white-space: nowrap;
  }
  thead th:first-child { color: var(--accent); width: 60px; text-align: center; }
  tbody tr {
    background: var(--table-row);
    border-bottom: 1px solid var(--table-border);
    transition: background 0.15s;
  }
  tbody tr:nth-child(even) { background: var(--table-alt); }
  tbody tr:hover { background: rgba(0, 229, 160, 0.05); }
  tbody td {
    padding: 14px 16px;
    vertical-align: top;
    line-height: 1.65;
  }
  tbody td:first-child {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    opacity: 0.7;
    width: 60px;
  }
  .cell-text {
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* ── Error ── */
  .error-box {
    display: none;
    background: rgba(255, 94, 94, 0.08);
    border: 1px solid rgba(255,94,94,0.3);
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 24px;
  }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  /* ── Footer ── */
  footer {
    padding: 20px 40px;
    border-top: 1px solid var(--border);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: var(--text-dim);
    display: flex; justify-content: space-between; align-items: center;
  }
  .footer-dot { color: var(--accent); }

  /* ── Animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .fade-up { animation: fadeUp 0.4s ease both; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  .pulsing { animation: pulse 1.4s ease-in-out infinite; }
</style>
</head>
<body>

<header>
  <div class="logo-mark">📄</div>
  <div class="logo-text">
    <div class="logo-title">PDF OCR 변환기</div>
    <div class="logo-sub">POWERED BY CLAUDE AI</div>
  </div>
  <div class="header-right">
    <span class="api-badge">claude-sonnet-4</span>
  </div>
</header>

<main>

  <!-- API Key -->
  <div class="api-section fade-up">
    <div class="section-label">Anthropic API Key</div>
    <div class="api-key-row">
      <input type="password" id="apiKey" class="api-key-input"
             placeholder="sk-ant-api03-..." />
      <button class="btn btn-ghost" onclick="toggleApiKeyVisibility()">👁 보기</button>
    </div>
  </div>

  <!-- Error -->
  <div class="error-box" id="errorBox"></div>

  <!-- Drop Zone -->
  <div class="drop-zone fade-up" id="dropZone"
       ondragover="handleDragOver(event)"
       ondragleave="handleDragLeave(event)"
       ondrop="handleDrop(event)"
       onclick="document.getElementById('file-input').click()">
    <div class="drop-icon">📂</div>
    <div class="drop-title">PDF 파일을 여기에 끌어다 놓거나 클릭하세요</div>
    <div class="drop-sub">최대 50MB · 다중 페이지 지원 · 스캔 이미지 PDF 가능</div>
    <button class="btn btn-primary" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
      파일 선택하기
    </button>
    <input type="file" id="file-input" accept=".pdf" onchange="handleFileSelect(event)" />
  </div>

  <!-- Progress -->
  <div class="progress-wrap fade-up" id="progressWrap">
    <div class="progress-header">
      <span class="progress-label pulsing" id="progressLabel">PDF 분석 중...</span>
      <span class="progress-pct" id="progressPct">0%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-log" id="progressLog"></div>
  </div>

  <!-- Result -->
  <div class="result-section fade-up" id="resultSection">
    <div class="result-header">
      <div>
        <div class="result-title" id="resultTitle">추출 결과</div>
        <div class="result-meta" id="resultMeta"></div>
      </div>
      <div class="result-actions">
        <button class="btn btn-ghost" onclick="copyAllText()">📋 전체 복사</button>
        <button class="btn btn-ghost" onclick="downloadCSV()">⬇ CSV 저장</button>
        <button class="btn btn-primary" onclick="resetAll()">새 파일 변환</button>
      </div>
    </div>
    <div class="table-wrap">
      <table id="resultTable">
        <thead>
          <tr>
            <th>페이지</th>
            <th>추출된 텍스트 내용</th>
          </tr>
        </thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
  </div>

</main>

<footer>
  <span><span class="footer-dot">●</span> API 키는 브라우저 내에서만 사용되며 전송되지 않습니다</span>
  <span>PDF.js + Claude Vision OCR</span>
</footer>

<script>
  // PDF.js worker
  pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let extractedData = [];
  let currentFileName = '';

  /* ── Drag & Drop ── */
  function handleDragOver(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.add('drag-over');
  }
  function handleDragLeave(e) {
    document.getElementById('dropZone').classList.remove('drag-over');
  }
  function handleDrop(e) {
    e.preventDefault();
    document.getElementById('dropZone').classList.remove('drag-over');
    const file = e.dataTransfer.files[0];
    if (file && file.type === 'application/pdf') processFile(file);
    else showError('PDF 파일만 지원됩니다.');
  }
  function handleFileSelect(e) {
    const file = e.target.files[0];
    if (file) processFile(file);
  }

  /* ── API Key toggle ── */
  function toggleApiKeyVisibility() {
    const el = document.getElementById('apiKey');
    el.type = el.type === 'password' ? 'text' : 'password';
  }

  /* ── Main flow ── */
  async function processFile(file) {
    const apiKey = document.getElementById('apiKey').value.trim();
    if (!apiKey) { showError('Anthropic API 키를 먼저 입력해주세요.'); return; }

    clearError();
    currentFileName = file.name;
    extractedData = [];

    // UI state
    document.getElementById('dropZone').style.display = 'none';
    document.getElementById('resultSection').style.display = 'none';
    showProgress(true);
    setProgress(0, 'PDF 파일 로딩 중...');

    try {
      // 1. Load PDF
      const arrayBuffer = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
      const totalPages = pdf.numPages;
      setProgress(5, `총 ${totalPages}페이지 감지됨`);

      // 2. Render each page to image + OCR
      for (let pageNum = 1; pageNum <= totalPages; pageNum++) {
        const pct = Math.round(5 + ((pageNum - 1) / totalPages) * 90);
        setProgress(pct, `페이지 ${pageNum}/${totalPages} 렌더링 중...`);

        const imageBase64 = await renderPageToBase64(pdf, pageNum);
        setProgress(pct + 2, `페이지 ${pageNum}/${totalPages} OCR 분석 중...`);

        const text = await ocrWithClaude(apiKey, imageBase64, pageNum, totalPages);
        extractedData.push({ page: pageNum, text });
      }

      setProgress(100, '완료!');
      await sleep(500);

      showProgress(false);
      renderTable(totalPages, file.name);

    } catch (err) {
      showProgress(false);
      document.getElementById('dropZone').style.display = '';
      showError('오류: ' + err.message);
    }
  }

  /* ── Render PDF page to base64 PNG ── */
  async function renderPageToBase64(pdf, pageNum) {
    const page = await pdf.getPage(pageNum);
    const viewport = page.getViewport({ scale: 2.0 }); // 2x for better OCR

    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;
    const ctx = canvas.getContext('2d');

    await page.render({ canvasContext: ctx, viewport }).promise;
    const dataUrl = canvas.toDataURL('image/png');
    return dataUrl.split(',')[1]; // base64 only
  }

  /* ── Claude OCR ── */
  async function ocrWithClaude(apiKey, imageBase64, pageNum, totalPages) {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4000,
        messages: [{
          role: 'user',
          content: [
            {
              type: 'image',
              source: {
                type: 'base64',
                media_type: 'image/png',
                data: imageBase64
              }
            },
            {
              type: 'text',
              text: `이것은 PDF의 ${pageNum}/${totalPages} 페이지입니다.
이미지에 있는 모든 텍스트를 OCR로 추출해주세요.

규칙:
- 보이는 텍스트를 빠짐없이, 순서대로 추출하세요
- 줄바꿈, 단락 구분을 원문대로 유지하세요
- 표나 목록이 있으면 구조를 최대한 보존하세요
- 텍스트가 없는 페이지면 "[이미지 또는 빈 페이지]"라고 출력하세요
- 설명이나 부가 코멘트 없이 추출된 텍스트만 출력하세요`
            }
          ]
        }]
      })
    });

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err?.error?.message || `API 오류 (${response.status})`);
    }

    const data = await response.json();
    return data.content?.[0]?.text || '[텍스트 없음]';
  }

  /* ── Render Table ── */
  function renderTable(totalPages, fileName) {
    const tbody = document.getElementById('resultBody');
    tbody.innerHTML = '';

    extractedData.forEach(({ page, text }) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${page}</td>
        <td><div class="cell-text">${escapeHtml(text)}</div></td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('resultTitle').textContent = fileName;
    document.getElementById('resultMeta').textContent =
      `총 ${totalPages}페이지 · 추출 완료`;
    document.getElementById('resultSection').style.display = '';
  }

  /* ── Copy All ── */
  function copyAllText() {
    const text = extractedData
      .map(d => `=== 페이지 ${d.page} ===\n${d.text}`)
      .join('\n\n');
    navigator.clipboard.writeText(text)
      .then(() => alert('전체 텍스트가 클립보드에 복사되었습니다!'));
  }

  /* ── Download CSV ── */
  function downloadCSV() {
    const rows = [['페이지', '텍스트 내용']];
    extractedData.forEach(d => {
      rows.push([d.page, '"' + d.text.replace(/"/g, '""') + '"']);
    });
    const csv = '\uFEFF' + rows.map(r => r.join(',')).join('\n'); // BOM for Excel
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = currentFileName.replace('.pdf', '') + '_ocr.csv';
    a.click();
    URL.revokeObjectURL(url);
  }

  /* ── Reset ── */
  function resetAll() {
    document.getElementById('resultSection').style.display = 'none';
    document.getElementById('dropZone').style.display = '';
    document.getElementById('file-input').value = '';
    extractedData = [];
  }

  /* ── Progress helpers ── */
  function showProgress(show) {
    document.getElementById('progressWrap').style.display = show ? '' : 'none';
  }
  function setProgress(pct, log) {
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('progressPct').textContent = pct + '%';
    if (log) document.getElementById('progressLog').textContent = '› ' + log;
  }

  /* ── Error helpers ── */
  function showError(msg) {
    const el = document.getElementById('errorBox');
    el.textContent = msg;
    el.style.display = '';
  }
  function clearError() {
    document.getElementById('errorBox').style.display = 'none';
  }

  /* ── Utils ── */
  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;')
              .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
</script>
</body>
</html>
