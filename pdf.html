<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Symantec Report Parser</title>

<script src="https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';
</script>

<style>
body { background:#111;color:#eee;font-family:sans-serif;padding:20px }
#dropZone { border:2px dashed #555;padding:40px;text-align:center;cursor:pointer }
table { border-collapse:collapse;width:100%;margin-top:20px }
td,th { border:1px solid #444;padding:6px }
</style>
</head>

<body>

<h2>📊 Symantec 리포트 자동 추출</h2>

<div id="dropZone"
 onclick="fileInput.click()"
 ondragover="event.preventDefault()"
 ondrop="onDrop(event)">
 PDF 업로드
 <input type="file" id="fileInput" hidden accept=".pdf" onchange="onFilePick(event)">
</div>

<table>
<thead>
<tr>
<th>Customer</th>
<th>Date</th>
<th>Host</th>
<th>CPU</th>
<th>MEM</th>
<th>HTTP</th>
<th>HTTPS</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<button onclick="downloadExcel()">엑셀 다운로드</button>

<script>

let results = [];

function onDrop(e){
  e.preventDefault();
  run(e.dataTransfer.files[0]);
}
function onFilePick(e){
  run(e.target.files[0]);
}

async function run(file){

  const buf = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({data:buf}).promise;

  let fullText = '';

  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    fullText += content.items.map(i=>i.str).join(' ') + '\n';
  }

  parse(fullText);
}

// 🔥 핵심 파서
function parse(text){

  const data = {
    customer: find(text, /Customer Name\s+([A-Z0-9_]+)/),
    date: find(text, /Date\s+([0-9\.\sA-Za-z]+)/),
    host: find(text, /Host Name\s+([A-Z0-9_]+)/),
    cpu: find(text, /CPU\s+([0-9]+°C)/),
    mem: find(text, /MEM Usage.*?([0-9]+%)/),
    http: find(text, /HTTP\s+([0-9\.]+%)/),
    https: find(text, /HTTPS\s+([0-9\.]+%)/)
  };

  results.push(data);
  render();
}

function find(text, regex){
  const m = text.match(regex);
  return m ? m[1] : '';
}

function render(){

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';

  results.forEach(r=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.customer}</td>
      <td>${r.date}</td>
      <td>${r.host}</td>
      <td>${r.cpu}</td>
      <td>${r.mem}</td>
      <td>${r.http}</td>
      <td>${r.https}</td>
    `;
    tbody.appendChild(tr);
  });
}

function downloadExcel(){

  const ws = XLSX.utils.json_to_sheet(results);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Report");
  XLSX.writeFile(wb, "symantec_report.xlsx");
}

</script>

</body>
</html>
