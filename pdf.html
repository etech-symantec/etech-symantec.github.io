<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>텍스트 → 표 변환기 (복붙 전용)</title>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>
body { font-family: sans-serif; background:#111; color:#eee; padding:20px }
textarea {
  width:100%; height:200px;
  background:#222; color:#fff;
  border:1px solid #444; padding:10px;
}
button { margin:10px 5px; padding:8px 16px }
table { border-collapse: collapse; width:100%; margin-top:20px }
td, th { border:1px solid #444; padding:6px }
</style>
</head>

<body>

<h2>📋 PDF 복붙 → 표 자동 변환</h2>

<textarea id="input" placeholder="PDF에서 전체 복사해서 여기 붙여넣기"></textarea>

<br>
<button onclick="parseText()">표 생성</button>
<button onclick="downloadExcel()">엑셀 다운로드</button>

<table>
<thead id="thead"></thead>
<tbody id="tbody"></tbody>
</table>

<script>

let tableData = [];

function parseText(){

  const text = document.getElementById('input').value.trim();

  // 줄 기준 분리
  const lines = text.split('\n').map(l=>l.trim()).filter(Boolean);

  tableData = lines.map(line => {

    // 🔥 핵심: 여러 구분자 자동 처리
    let cols;

    if(line.includes('\t')){
      cols = line.split('\t');
    }
    else if(line.includes(',')){
      cols = line.split(',');
    }
    else{
      cols = line.split(/\s{2,}/); // 공백 2칸 이상
    }

    return cols.map(c=>c.trim());
  });

  render();
}

function render(){

  const thead = document.getElementById('thead');
  const tbody = document.getElementById('tbody');

  thead.innerHTML = '';
  tbody.innerHTML = '';

  if(tableData.length === 0) return;

  const maxCols = Math.max(...tableData.map(r=>r.length));

  // 헤더
  let headRow = '<tr>';
  for(let i=0;i<maxCols;i++){
    headRow += `<th>${tableData[0][i] || '컬럼'+(i+1)}</th>`;
  }
  headRow += '</tr>';

  thead.innerHTML = headRow;

  // 바디
  tableData.slice(1).forEach(row=>{
    const tr = document.createElement('tr');

    let html='';
    for(let i=0;i<maxCols;i++){
      html += `<td>${row[i] || ''}</td>`;
    }

    tr.innerHTML = html;
    tbody.appendChild(tr);
  });
}

function downloadExcel(){

  const ws = XLSX.utils.aoa_to_sheet(tableData);
  const wb = XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
  XLSX.writeFile(wb, "table.xlsx");
}

</script>

</body>
</html>
